<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="weather-box">
        <h2>Weather App</h2>

        <input type="text" id="inp" placeholder="Enter city name" />

        <button>Search</button>

        <div class="weather-info">
          <h1>28°C</h1>
          <p>Sunny</p>
          <span>Karachi</span>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
